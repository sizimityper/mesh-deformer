name: Release VPM Package

on:
  push:
    branches:
      - main
    paths:
      - 'Packages/com.sizimityper.mesh-deformer/package.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version Packages/com.sizimityper.mesh-deformer/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd Packages/com.sizimityper.mesh-deformer
          zip -r ../../com.sizimityper.mesh-deformer-${{ steps.version.outputs.version }}.zip .

      - name: Create release and upload zip
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            com.sizimityper.mesh-deformer-${{ steps.version.outputs.version }}.zip \
            --title "${{ steps.version.outputs.version }}" \
            --notes ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger VPM listing update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VPM_LISTING_TOKEN }}
          repository: sizimityper/vpm
          event-type: update-listing
