name: Release VPM Package

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(cat Packages/com.sizimityper.mesh-deformer/package.json | python3 -c \"import sys,json; print(json.load(sys.stdin)['version'])\")" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd Packages
          zip -r ../com.sizimityper.mesh-deformer-${{ steps.version.outputs.version }}.zip com.sizimityper.mesh-deformer/

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: com.sizimityper.mesh-deformer-${{ steps.version.outputs.version }}.zip

      - name: Trigger VPM listing update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VPM_LISTING_TOKEN }}
          repository: sizimityper/vpm
          event-type: update-listing
